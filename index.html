 const catGroup=!activeCat?`<div class="fgroup"><div class="gl">CATÉGORIE</div>${CATS.map(c=>`<div class="fopt" onclick="pickCat('${c}')">${CAT_EMOJI[c]} ${c}<span class="c">${P.filter(p=>p.cat===c).length}</span></div>`).join("")}</div>`:"";

 const otifC=v=>v>=95?'#1E7A46':v>=90?'#E8A317':'#D64545';
 const gaps=[["« avocat mûr à point »",42],["« pain burger brioché »",38],["« steak végétal »",29],["« emballage kraft compostable »",24],["« crème allégée 15% »",18]];

 <div class="ccols" style="display:flex;gap:18px;margin-top:16px;flex-wrap:wrap">

   <div style="font-size:12.5px;font-weight:700;margin-bottom:4px">Grille dégressive (ex. Kombucha)</div><table><tr><th>Palier</th><th>Prix/colis</th><th>Remise</th></tr>${[["1 colis","53,28 €","—"],["5 colis","51,68 €","−3%"],["10 colis","50,08 €","−6%"],["Palette (48)","47,95 €","−10%"]].map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td style="color:var(--green);font-weight:700">${r[2]}</td></tr>`).join("")}</table>
   <div style="margin-top:8px;background:var(--tint);border-radius:10px;padding:10px 12px;font-size:12px"><b style="color:var(--green)">Calendrier promos volume :</b> Euro de foot → bières & snacks ; rentrée sept. → cartes de saison ; été → rosé & softs. Indice prix vs Metro : <b>98</b> (2% moins cher).</div></div>

  <div class="panel" style="flex:1;min-width:360px"><div class="ptitle">🔁 4 · Réflexe FoodFlow <span style="font-size:11px;color:var(--grey);font-weight:600">· rétention & mercuriales types</span></div>
   ${merc.map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F1F5F2"><b style="width:130px;font-size:13px">${m[0]}</b><div style="flex:1;font-size:11.5px;color:var(--grey)">${m[1]}</div><button class="smallbtn" onclick="toast('<span class=ok>✓</span> Mercuriale poussée au profil')">Pousser</button></div>`).join("")}
   <div style="margin-top:10px;background:var(--tint);border-radius:10px;padding:10px 12px;font-size:12px"><b style="color:var(--green)">Monétisation fournisseur :</b> 12 marques sponsorisent leurs produits (« huile de friture » → tête de liste). Revenu retail media : <b>3 240 €/mois</b>, ROAS ×5,1.</div></div>
 </div>`;

function consGap(){
 const zones=["Paris","IDF Nord","IDF Sud","IDF Ouest"];
 const cov=(c,z)=>{const base={Paris:88,"IDF Nord":70,"IDF Sud":58,"IDF Ouest":46}[z];const h=(c.length*7+z.length*5)%26;return Math.max(22,Math.min(97,base-13+h));};
 const color=v=>v>=75?'#1E7A46':v>=55?'#E8A317':'#D64545';
 return `<div class="count">Couverture de l'assortiment par catégorie × zone — les cases rouges sont des trous à combler par le sourcing de marques</div>
  <div class="panel" style="margin-top:14px;overflow:auto"><table class="heat"><tr><th></th>${zones.map(z=>`<th>${z}</th>`).join("")}</tr>${CATS.map(c=>`<tr><td style="text-align:left;font-weight:700">${CAT_EMOJI[c]} ${c}</td>${zones.map(z=>{const v=cov(c,z);return `<td><div class="hc" style="background:${color(v)}">${v}%</div></td>`;}).join("")}</tr>`).join("")}</table>
   <div style="margin-top:12px;background:var(--tint);border-radius:10px;padding:11px 13px;font-size:12.5px"><b style="color:var(--green)">Reco IA :</b> IDF Ouest est sous-couvert en Crémerie et Boissons → prioriser le référencement de Ferme du Val et Béguin sur cette zone. 6 trous critiques détectés.</div></div>`;
}
function consReview(){
 const pend=REQUESTS.filter(r=>r.status==='pending');const done=REQUESTS.filter(r=>r.status!=='pending');
 return `<div class="count">Les demandes de création produit des fournisseurs arrivent ici — on vérifie la pertinence, la qualité de la fiche et l'assortiment avant publication</div>
  ${pend.length?pend.map((r,i)=>{const idx=REQUESTS.indexOf(r);return `<div class="panel" style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px"><div style="flex:1;min-width:280px"><div style="display:flex;align-items:center;gap:10px"><div style="width:50px;height:50px;border-radius:10px;background:${CAT_BG[r.cat]||'#eee'};display:flex;align-items:center;justify-content:center;font-size:26px">${CAT_EMOJI[r.cat]||'📦'}</div><div><b style="font-size:15px">${r.n}</b><div style="color:var(--grey);font-size:12px">EAN ${r.ean} · ${r.brand} · ${r.cat}</div></div></div><div style="font-size:12.5px;color:#555;margin-top:8px"><b>Caractéristiques :</b> ${r.char}</div></div>
    <div style="min-width:230px;background:var(--tint);border-radius:12px;padding:12px"><div style="font-size:11px;font-weight:800;color:var(--green)">ANALYSE DE PERTINENCE IA</div><div style="display:flex;align-items:center;gap:8px;margin:6px 0"><span class="qscore" style="background:${scoreColor(r.score)}">${r.score}/100</span><span style="font-size:12px;color:var(--grey)">score d'assortiment</span></div><div style="font-size:12px;color:#555">${r.gap}</div></div></div>
    <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end"><button class="smallbtn" onclick="reqReject(${idx})" style="border-color:var(--red);color:var(--red)">Refuser</button><button class="smallbtn" onclick="toast('💬 Demande d\\'info envoyée au fournisseur')">Demander + d'infos</button><button class="btn" style="padding:8px 18px" onclick="reqApprove(${idx})">✓ Valider &amp; publier</button></div></div>`;}).join(""):`<div class="empty">Aucune demande en attente. 🎉</div>`}
  ${done.length?`<div class="ptitle" style="margin-top:20px">Traitées récemment</div>${done.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F1F5F2;font-size:12.5px"><span class="statusdot ${r.status==='approved'?'ok':'rupt'}">${r.status==='approved'?'Validée':'Refusée'}</span><b>${r.n}</b><span style="color:var(--grey)">${r.brand} · EAN ${r.ean}</span></div>`).join("")}`:''}`;
}
function reqApprove(i){REQUESTS[i].status='approved';toast(`<span class="ok">✓</span> « ${REQUESTS[i].n.slice(0,24)}… » validée et publiée`);renderConsole();}
function reqReject(i){REQUESTS[i].status='rejected';toast(`Demande « ${REQUESTS[i].n.slice(0,24)}… » refusée`);renderConsole();}

// SEARCH
const searchEl=document.getElementById("search"),acEl=document.getElementById("ac");
searchEl.addEventListener("input",e=>{search=e.target.value;if(search.length>=1){const sug=P.filter(p=>p.n.toLowerCase().includes(search.toLowerCase())||(p.brand||"").toLowerCase().includes(search.toLowerCase())).slice(0,6);acEl.innerHTML=sug.map(p=>`<div onmousedown="pickSug(${p.id})">${p.emoji} ${p.n}${p.brand?` · <span style="color:var(--green)">${p.brand}</span>`:''}</div>`).join("")||`<div style="color:var(--grey)">Aucun résultat</div>`;acEl.classList.remove("hide");}else acEl.classList.add("hide");mode="shop";view="listing";activeCat="";activeSub="";collection="";shown=12;render();});
searchEl.addEventListener("blur",()=>setTimeout(()=>acEl.classList.add("hide"),150));

document.addEventListener("click",()=>{const m=document.getElementById("estMenu");if(m&&!m.classList.contains("hide"))m.classList.add("hide");});
// visite guidée — mode spotlight
const TOUR=[
 {t:"Bienvenue sur FoodFlow 👋",x:"La marketplace repensée pour la restauration. La visite suit un ordre logique : d'abord côté Acheteur, puis Fournisseur, puis Console manager. Cliquez « Suivant ».",go:()=>{closeAll();setMode('shop');goHome();}},
 {t:"3 modes, un seul outil",x:"Acheteur · Fournisseur · Console manager. On va les parcourir dans cet ordre — un pas après l'autre.",sel:".viewswitch",go:()=>{closeAll();setMode('shop');goHome();}},
 {t:"① Côté acheteur — les catégories",x:"Chaque catégorie se déplie en sous-catégories ; un reclic la replie. Navigation pensée pour un chef pressé.",sel:".side",go:()=>{closeAll();setMode('shop');goHome();toggleCat('Boucherie');}},
 {t:"Des filtres ciblés par catégorie",x:"Les facettes s'adaptent au rayon : le « régime » apparaît en boucherie, jamais sur les fruits. Plus un filtre par marque partenaire.",sel:".filters",go:()=>{}},
 {t:"La fiche produit & la Buy Box",x:"La « meilleure offre » est choisie par algorithme — cliquez un autre vendeur pour comparer. Allergènes et fiche HACCP inclus.",sel:"#drawer",go:()=>{openPDP(0);}},
 {t:"Panier & commande",x:"Groupé par catégorie, upsell « souvent achetés ensemble », livraison offerte, puis un checkout avec créneau.",sel:"#cartDrawer",go:()=>{closeAll();addCart(0);addCart(16);openCart();}},
 {t:"② On passe côté Fournisseur 🏭",x:"On bascule sur le back-office des marques : tableau de bord, commandes, performance, avis.",sel:".supnav",go:()=>{closeAll();setMode('supplier');supTab='dash';renderSupplier();}},
 {t:"Demander la création d'un produit",x:"La marque saisit EAN + photo + caractéristiques → l'IA rédige la fiche, prête à soumettre à notre validation.",sel:".wizard",go:()=>{supTab='add';renderSupplier();}},
 {t:"Import catalogue — templates par catégorie",x:"Comme Amazon : la marque choisit sa catégorie, télécharge le template pré-rempli (.xlsx/.csv), le complète et le renvoie. On valide produits + attributs avant publication.",sel:".ccols",go:()=>{supTab='imports';renderSupplier();}},
 {t:"FoodFlow Ads 🚀",x:"Formats sponsorisés, vidéo en tête de catégorie — survolez un format pour l'aperçu. Retail media gouverné.",sel:".adgrid",go:()=>{supTab='ads';renderSupplier();}},
 {t:"③ On passe côté Console — mon poste 🎯",x:"On bascule côté category manager : c'est ici que je valide les demandes et les imports catalogue des fournisseurs.",sel:".tabs",go:()=>{closeAll();setMode('console');consTab='demandes';renderConsole();}},
 {t:"Mon expertise — Category Management",x:"Les 4 leviers du poste : taux de service (OTIF), architecture de l'offre CHR, pricing & volume, rétention client.",sel:".ccols",go:()=>{consTab='cm';renderConsole();}},
 {t:"Piloter avec la data — 3 modules",x:"Top produits (best-sellers & marge), Saisonnalité (temps forts CHR) et Veille marché (tendances à capter avant les concurrents). C'est là que se joue la différence.",sel:".tabs",go:()=>{consTab='top';renderConsole();}},
 {t:"À vous de jouer 🎉",x:"Parcours complet : Acheteur → Fournisseur → Console. Explorez librement, ou relancez la visite quand vous voulez.",go:()=>{closeAll();setMode('shop');goHome();}},
];
let tourStep=-1;
function ensureTourEls(){if(!document.getElementById('tourblock')){const bl=document.createElement('div');bl.id='tourblock';document.body.appendChild(bl);const sp=document.createElement('div');sp.id='spot';document.body.appendChild(sp);}}
function startTour(){ensureTourEls();tourStep=0;runTour();}
function runTour(){const s=TOUR[tourStep];try{if(s.go)s.go();}catch(e){}setTimeout(()=>placeStep(s),s.wait||420);}
function placeStep(s){
 const block=document.getElementById('tourblock'),spot=document.getElementById('spot');block.classList.add('show');
 renderTourCard();const card=document.getElementById('tourcard');
 const el=s.sel?document.querySelector(s.sel):null;
 if(el&&el.getBoundingClientRect().width>0){const r=el.getBoundingClientRect();const pad=8;
   spot.classList.add('on');spot.style.left=(r.left-pad)+'px';spot.style.top=Math.max(4,r.top-pad)+'px';spot.style.width=(r.width+pad*2)+'px';spot.style.height=(Math.min(r.height,window.innerHeight-8)+pad*2)+'px';
   const cw=card.offsetWidth||388,ch=card.offsetHeight||170,m=16,W=window.innerWidth,H=window.innerHeight;
   const cy=Math.min(Math.max(m,r.top+r.height/2-ch/2),H-ch-m);
   const cx=Math.min(Math.max(m,r.left+r.width/2-cw/2),W-cw-m);
   let pos;
   if(W-r.right>=cw+m) pos={left:r.right+m,top:cy};            // à droite de l'élément
   else if(r.left>=cw+m) pos={left:r.left-cw-m,top:cy};        // à gauche
   else if(H-r.bottom>=ch+m) pos={left:cx,top:r.bottom+m};     // en dessous
   else if(r.top>=ch+m) pos={left:cx,top:r.top-ch-m};          // au dessus
   else pos={left:(W-cw)/2,top:H-ch-22};                        // repli bas-centre
   card.style.bottom='auto';card.style.transform='none';card.style.left=pos.left+'px';card.style.top=pos.top+'px';
 } else {spot.classList.remove('on');card.style.top='auto';card.style.bottom='40px';card.style.left='50%';card.style.transform='translateX(-50%)';}
}
function tourNext(){if(tourStep<TOUR.length-1){tourStep++;runTour();}else endTour();}
function tourPrev(){if(tourStep>0){tourStep--;runTour();}}
function endTour(){tourStep=-1;const c=document.getElementById('tourcard');if(c)c.remove();const b=document.getElementById('tourblock');if(b)b.classList.remove('show');const sp=document.getElementById('spot');if(sp)sp.classList.remove('on');}
function renderTourCard(){let el=document.getElementById('tourcard');if(!el){el=document.createElement('div');el.id='tourcard';el.className='tourcard';document.body.appendChild(el);}const s=TOUR[tourStep];const pct=Math.round((tourStep+1)/TOUR.length*100);el.innerHTML=`<div class="prog"><i style="width:${pct}%"></i></div><div class="th"><span class="tn">${tourStep+1}/${TOUR.length}</span><b>${s.t}</b><button class="skip" onclick="endTour()">Passer ✕</button></div><div class="tx">${s.x}</div><div class="tb"><button class="tbtn ghost" onclick="tourPrev()" ${tourStep===0?'disabled':''}>← Précédent</button><button class="tbtn" onclick="tourNext()">${tourStep===TOUR.length-1?'Terminer 🎉':'Suivant →'}</button></div>`;}
render();
</script>
